name: CI + Allure Report

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # 🟢 中文报告
      - name: Run tests (ZH)
        run: |
          export LANGUAGE=zh
          pytest --alluredir=allure-results-zh

      # 🔵 英文报告
      - name: Run tests (EN)
        run: |
          export LANGUAGE=en
          pytest --alluredir=allure-results-en

      # 安装 Allure CLI
      - name: Install Allure
        run: |
          npm install -g allure-commandline

      # 生成 HTML
      - name: Generate Allure Reports
        run: |
          mkdir -p site
          cp site/index.html site/index.html || true
          allure generate allure-results-zh -o site/zh --clean
          allure generate allure-results-en -o site/en --clean

      # 发布到 GitHub Pages
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site